name: Build and Deploy

# triggers
on:
  push:
    branches:
      - staging
      - feature/*
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    environment: ${{ github.ref == 'refs/heads/staging' && 'staging' || 'dev' }}
     
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: routebox-shipments-api
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check files
      run: ls -la routebox-shipments-api/

    - name: AWS Login
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: us-east-1
        role-to-assume: ${{ vars.IAM_ROLE }}
        role-session-name: gha-session

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      with:
        registries: "957117875370"

    - name: Get short SHA
      run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Build image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      run: |
        docker build -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}" ./routebox-shipments-api

    - name: Push image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}      
      run: |
        docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region us-east-1 --name ${{ vars.CLUSTER_NAME }}

    - name: Deploy to Kubernetes/EKS
      run: |
        helm upgrade --install shipments-api ./routebox-shipments-api/helm/shipments-api \
          --namespace app-${{ vars.STAGE }} --create-namespace \
          --set image.tag=${IMAGE_TAG} \
          --values ./routebox-shipments-api/helm/shipments-api/${{ vars.STAGE }}-values.yaml