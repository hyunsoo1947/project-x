name: CI
on:
  push:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.6"

      - name: Run a multi-line script
        run: |
          export AWS_ACCESS_KEY_ID="${{ secrets.ACCESS_KEY }}"
          export AWS_SECRET_ACCESS_KEY="+Oa9A5cQFpNjk3B35NO5xlY400GwtC0ydiHvQl90"
          export AWS_SESSION_TOKEN=""
          
          cd environments/dev/
          terraform init
          terraform plan -var-file=dev.tfvars -input=false
          terraform apply -var-file=dev.tfvars -input=false -auto-approve          
